<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody - Análisis de Composición Corporal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary: #1A6B5A;
            --primary-light: #2A8B7A;
            --primary-dark: #0F4A3A;
            --gray-light: #F5F5F5;
            --gray-medium: #E8E8E8;
            --gray-dark: #666666;
            --gray-text: #333333;
            --white: #FFFFFF;
            --error: #D32F2F;
            --success: #388E3C;
            --border: #DDDDDD;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--white);
            color: var(--gray-text);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            flex: 1;
        }

        .medical-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .medical-icon::before {
            content: '✚';
            font-size: 20px;
            font-weight: bold;
        }

        .admin-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--gray-dark);
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-button:hover {
            color: var(--primary);
        }

        /* CHAT CONTAINER */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--white);
        }

        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .messages-wrapper::-webkit-scrollbar-track {
            background: var(--gray-light);
        }

        .messages-wrapper::-webkit-scrollbar-thumb {
            background: var(--gray-medium);
            border-radius: 3px;
        }

        /* MESSAGE BUBBLES */
        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.system {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.system .bubble {
            background: var(--gray-light);
            color: var(--gray-text);
            border: 1px solid var(--gray-medium);
        }

        .message.user .bubble {
            background: var(--primary);
            color: var(--white);
        }

        .bubble.error {
            background: #FFEBEE;
            color: var(--error);
            border: 1px solid #FFCDD2;
        }

        .bubble.success {
            background: #E8F5E9;
            color: var(--success);
            border: 1px solid #C8E6C9;
        }

        /* INFO SECTION */
        .info-section {
            background: var(--gray-light);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            border-left: 4px solid var(--primary);
        }

        .info-section h3 {
            color: var(--primary);
            font-size: 16px;
            margin-bottom: 8px;
        }

        .info-section p {
            color: var(--gray-text);
            font-size: 14px;
            line-height: 1.6;
        }

        /* CONFIRMATION PANEL */
        .confirmation-panel {
            background: var(--gray-light);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            border: 1px solid var(--gray-medium);
        }

        .confirmation-panel h3 {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .confirmation-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .confirmation-row:last-child {
            border-bottom: none;
        }

        .confirmation-label {
            color: var(--gray-dark);
            font-weight: 500;
        }

        .confirmation-value {
            color: var(--gray-text);
            text-align: right;
            flex: 1;
            margin-left: 16px;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-light);
        }

        .btn-primary:active {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--gray-medium);
            color: var(--gray-text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--gray-light);
        }

        .btn-secondary:active {
            background: var(--border);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            min-width: 80px;
        }

        /* INPUT AREA */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            background: var(--white);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .input-field {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--gray-text);
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26, 107, 90, 0.1);
        }

        .input-field::placeholder {
            color: #AAAAAA;
        }

        .btn-send {
            padding: 10px 16px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-send:hover {
            background: var(--primary-light);
        }

        .btn-send:active {
            background: var(--primary-dark);
        }

        /* TYPING INDICATOR */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-dark);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray-dark);
        }

        .modal-close:hover {
            color: var(--gray-text);
        }

        /* ADMIN PANEL */
        .admin-section {
            margin-bottom: 24px;
        }

        .admin-section h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--gray-medium);
            padding-bottom: 8px;
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-dark);
        }

        .form-group input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26, 107, 90, 0.1);
        }

        .consultorio-item {
            background: var(--gray-light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .consultorio-info {
            flex: 1;
            font-size: 14px;
        }

        .consultorio-info .name {
            font-weight: 600;
            color: var(--gray-text);
        }

        .consultorio-info .meta {
            font-size: 12px;
            color: var(--gray-dark);
            margin-top: 4px;
        }

        .consultorio-actions {
            display: flex;
            gap: 6px;
        }

        .btn-icon {
            padding: 6px 10px;
            font-size: 12px;
            flex: 0;
            min-width: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--gray-light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--gray-medium);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray-dark);
            margin-top: 4px;
        }

        .leads-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .leads-table th {
            background: var(--primary);
            color: white;
            padding: 8px 6px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .leads-table td {
            padding: 7px 6px;
            border-bottom: 1px solid var(--gray-medium);
            color: var(--gray-text);
            vertical-align: top;
        }

        .leads-table tr:hover td {
            background: var(--gray-light);
        }

        .status-completado {
            color: var(--success);
            font-weight: 600;
        }

        .status-abandonado {
            color: var(--error);
            font-weight: 600;
        }

        .qr-container {
            background: var(--white);
            padding: 12px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid var(--border);
        }

        .qr-label {
            font-size: 12px;
            color: var(--gray-dark);
            margin-bottom: 8px;
            text-align: center;
        }

        /* WELCOME MODAL */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .welcome-modal.hidden {
            display: none;
        }

        .welcome-content {
            background: var(--white);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--gray-dark);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .welcome-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .modal {
                width: 95%;
                max-height: 90vh;
            }

            .welcome-content {
                width: 95%;
                padding: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                min-width: auto;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .bubble {
                max-width: 95%;
            }
        }

        /* HIDE ELEMENTS */
        .hidden {
            display: none !important;
        }

        .invisible {
            visibility: hidden;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-title">
            <div class="medical-icon"></div>
            <span>Asistente InBody</span>
        </div>
        <button class="admin-button" id="adminTrigger" title="Panel de administración">⚙️</button>
    </div>

    <!-- CHAT CONTAINER -->
    <div class="chat-container">
        <div class="messages-wrapper" id="messagesWrapper"></div>
        <div class="input-area" id="inputArea">
            <input
                type="text"
                class="input-field"
                id="userInput"
                placeholder="Escriba su respuesta..."
                autocomplete="off"
            >
            <button class="btn-send" id="sendButton">Enviar</button>
        </div>
    </div>

    <!-- WELCOME MODAL -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="welcome-content">
            <div class="welcome-icon">✚</div>
            <h2 class="welcome-title">Análisis InBody</h2>
            <p class="welcome-subtitle">¿Desea agendar su estudio de composición corporal?</p>
            <div class="welcome-buttons">
                <button class="btn btn-primary" id="welcomeYes">Sí, agendar estudio</button>
                <button class="btn btn-secondary" id="welcomeInfo">Ver información</button>
            </div>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <button class="modal-close" id="adminClose">✕</button>
            <div class="modal-header">Panel de Administración</div>

            <!-- PASSWORD ENTRY -->
            <div id="adminPassword" class="admin-section">
                <div class="admin-form">
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="adminPasswordInput" placeholder="Ingrese contraseña">
                    </div>
                    <button class="btn btn-primary" id="adminLogin">Ingresar</button>
                </div>
            </div>

            <!-- ADMIN CONTENT (Hidden until login) -->
            <div id="adminContent" class="hidden">
                <!-- STATS -->
                <div class="admin-section">
                    <h2>Estadísticas</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="statsTotal">0</div>
                            <div class="stat-label">Interacciones totales</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="statsCompleted">0</div>
                            <div class="stat-label">Citas agendadas</div>
                        </div>
                    </div>
                </div>

                <!-- CONSULTORIOS -->
                <div class="admin-section">
                    <h2>Gestionar Consultorios</h2>
                    <div class="admin-form">
                        <div class="form-group">
                            <label>ID (slug)</label>
                            <input type="text" id="consultorioId" placeholder="ej: centro">
                        </div>
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" id="consultorioName" placeholder="ej: Consultorio Centro">
                        </div>
                        <div class="form-group">
                            <label>Doctor/Doctora</label>
                            <input type="text" id="consultorioDoctor" placeholder="ej: Dra. María García">
                        </div>
                        <div class="form-group">
                            <label>Número WhatsApp</label>
                            <input type="text" id="consultorioWhatsapp" placeholder="ej: 3312345678">
                        </div>
                        <div class="form-group">
                            <label>Dirección</label>
                            <input type="text" id="consultorioAddress" placeholder="ej: Av. Juárez 120">
                        </div>
                        <button class="btn btn-primary" id="addConsultorio">Agregar Consultorio</button>
                    </div>

                    <div id="consultoriosList"></div>
                </div>

                <!-- LEADS REGISTRY -->
                <div class="admin-section">
                    <h2>Registro de Leads</h2>
                    <div style="display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;">
                        <select id="leadsFilter" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; flex: 1; min-width: 140px;">
                            <option value="all">Todos los consultorios</option>
                        </select>
                        <select id="leadsStatusFilter" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;">
                            <option value="all">Todos los estados</option>
                            <option value="completado">Completados</option>
                            <option value="abandonado">Abandonados</option>
                        </select>
                        <button class="btn btn-primary" id="exportLeads" style="font-size: 13px; padding: 8px 16px;">Exportar CSV</button>
                    </div>
                    <div id="leadsCount" style="font-size: 12px; color: var(--gray-dark); margin-bottom: 8px;"></div>
                    <div id="leadsTable" style="overflow-x: auto;"></div>
                </div>

                <!-- QR GENERATOR -->
                <div class="admin-section">
                    <h2>Generar Códigos QR</h2>
                    <div class="admin-form">
                        <div class="form-group">
                            <label>Seleccionar consultorio</label>
                            <select id="qrConsultorio" style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit;">
                                <option value="">-- Seleccionar --</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="generateQr">Generar QR</button>
                    </div>
                    <div id="qrOutput"></div>
                </div>

                <!-- SUPABASE CONFIG -->
                <div class="admin-section">
                    <h2>Conexión a Base de Datos</h2>
                    <div id="supabaseStatus" style="padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; background: var(--gray-light); color: var(--gray-dark);">
                        Verificando conexión...
                    </div>
                    <div class="admin-form">
                        <div class="form-group">
                            <label>Supabase URL</label>
                            <input type="text" id="supabaseUrl" placeholder="https://xxxxx.supabase.co" style="font-size: 12px;">
                        </div>
                        <div class="form-group">
                            <label>Supabase Anon Key</label>
                            <input type="text" id="supabaseKey" placeholder="eyJhbGciOi..." style="font-size: 12px;">
                        </div>
                        <button class="btn btn-primary" id="saveSupabase">Guardar y Conectar</button>
                    </div>
                </div>

                <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" id="adminLogout">Cerrar sesión</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION & STATE
        // ============================================

        const CONFIG = {
            password: 'inbody2024',
            colors: {
                primary: '#1A6B5A',
                gray: '#F5F5F5',
            },
            consultorios: [
                { id: 'centro', nombre: 'Consultorio Centro', doctor: 'Dra. María García', whatsapp: '3312345678', direccion: 'Av. Juárez 120 Col. Centro' },
                { id: 'providencia', nombre: 'Consultorio Providencia', doctor: 'Dr. Roberto Sánchez', whatsapp: '3387654321', direccion: 'Av. Providencia 456' },
                { id: 'zapopan', nombre: 'Consultorio Zapopan', doctor: 'Dra. Laura Martínez', whatsapp: '3398765432', direccion: 'Blvd. Puerta de Hierro 789' },
                { id: 'tlaquepaque', nombre: 'Consultorio Tlaquepaque', doctor: 'Dr. Carlos López', whatsapp: '3376543210', direccion: 'Av. Niños Héroes 234' },
                { id: 'chapalita', nombre: 'Consultorio Chapalita', doctor: 'Dra. Ana Rodríguez', whatsapp: '3365432109', direccion: 'Av. Guadalupe 567' },
                { id: 'vallarta', nombre: 'Consultorio Vallarta', doctor: 'Dr. Miguel Torres', whatsapp: '3354321098', direccion: 'Av. Vallarta 890' },
            ],
            messages: {
                welcome: '¡Hola! Bienvenido al análisis InBody. Seleccione una opción para continuar.',
                infoMenu: '¿Qué desea saber sobre el estudio InBody?',
                errorName: 'Por favor, ingrese su nombre completo (nombre y apellido).',
                errorPhone: 'Por favor, ingrese un teléfono válido (10 dígitos).',
                errorBirthdate: 'Por favor, ingrese una fecha válida (formato: dd/mm/aaaa).',

        function parsePhone(input) {
            const digits = input.replace(/\D/g, '');
            if (digits.length === 10 && /^\d{10}$/.test(digits)) {
                return digits;
            }
            return null;
        }

        function parseName(input) {
            const trimmed = input.trim();
            const words = trimmed.split(/\s+/).filter(w => w.length > 0);
            if (words.length >= 2) {
                return words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            }
            return null;
        }

        function parseBirthdate(input) {
            const cleaned = input.trim();

            // Try dd/mm/yyyy or dd-mm-yyyy
            let match = cleaned.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
            if (match) {
                const [_, day, month, year] = match;
                const d = parseInt(day);
                const m = parseInt(month);
                const y = parseInt(year);
                if (d >= 1 && d <= 31 && m >= 1 && m <= 12 && y >= 1900 && y <= 2100) {
                    const date = new Date(y, m - 1, d);
                    if (date.getDate() === d) {
                        const age = new Date().getFullYear() - y;
                        if (age >= 10 && age <= 100) {
                            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${y}`;
                        }
                    }
                }
            }

            return null;
        }

        function parseHeight(input) {
            const cleaned = input.toLowerCase().replace(/\s*cm?\s*$/, '').trim();
            const num = parseFloat(cleaned.replace(',', '.'));

            if (!isNaN(num)) {
                let height = num;
                if (num < 3) {
                    height = num * 100;
                }
                if (height >= 100 && height <= 220) {
                    return Math.round(height);
                }
            }

            return null;
        }

        function parseGender(input) {
            const normalized = input.toLowerCase().trim();
            const masc = ['masculino', 'hombre', 'm', 'h', 'masc'];
            const fem = ['femenino', 'mujer', 'f', 'fem'];

            if (masc.includes(normalized)) return 'Masculino';
            if (fem.includes(normalized)) return 'Femenino';

            return null;
        }

        async function trackInteraction() {
            const key = `inbody_interactions_${state.consultorioId}`;

            const consultorio = CONFIG.consultorios.find(c => c.id === state.consultorioId);
            const sessionId = Date.now().toString();
            state.currentLeadId = sessionId;

            const lead = {
                id: sessionId,
                fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                fechaISO: new Date().toISOString(),
                consultorioId: state.consultorioId,

                fechaNacimiento: '',
                genero: '',
                talla: '',
            };

            // localStorage fallback
            const leads = JSON.parse(localStorage.getItem('inbody_leads') || '[]');
            leads.unshift(lead);
            if (leads.length > 500) leads.length = 500;
            localStorage.setItem('inbody_leads', JSON.stringify(leads));

            // Supabase insert
            if (supabase) {
                try {
                    const { error } = await supabase.from('leads').insert({
                        session_id: sessionId,
                        consultorio_id: state.consultorioId,

            }

        async function updateLead(data) {
            // localStorage update
            const leads = JSON.parse(localStorage.getItem('inbody_leads') || '[]');
            const idx = leads.findIndex(l => l.id === state.currentLeadId);
            if (idx !== -1) {
                Object.assign(leads[idx], data);
                localStorage.setItem('inbody_leads', JSON.stringify(leads));
            }

            // Supabase update
            if (supabase && state.currentLeadId) {
                try {
                    const supaData = {};
                    if (data.nombre) supaData.nombre = data.nombre;
                    if (data.telefono) supaData.telefono = data.telefono;
                    if (data.fechaNacimiento) supaData.fecha_nacimiento = data.fechaNacimiento;
                    if (data.genero) supaData.genero = data.genero;
                    if (data.talla) supaData.talla = data.talla;
                    if (data.estado) supaData.estado = data.estado;

                    await supabase
                        .from('leads')
                        .update(supaData)
                        .eq('session_id', state.currentLeadId);
                } catch (e) {

                CONFIG.consultorios[exists] = { id, nombre, doctor, whatsapp, direccion };
            } else {
                CONFIG.consultorios.push({ id, nombre, doctor, whatsapp, direccion });
            }

            localStorage.setItem('inbody_consultorios', JSON.stringify(CONFIG.consultorios));
            renderConsultorios();
            updateQrSelect();

            document.getElementById('consultorioId').value = '';
            document.getElementById('consultorioName').value = '';
            document.getElementById('consultorioDoctor').value = '';
            document.getElementById('consultorioWhatsapp').value = '';
            document.getElementById('consultorioAddress').value = '';
        }

        function deleteConsultorio(id) {
            if (confirm('¿Eliminar este consultorio?')) {
                CONFIG.consultorios = CONFIG.consultorios.filter(c => c.id !== id);
                localStorage.setItem('inbody_consultorios', JSON.stringify(CONFIG.consultorios));
                renderConsultorios();
                updateQrSelect();
            }
        }

        function updateQrSelect() {
            const select = document.getElementById('qrConsultorio');
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            CONFIG.consultorios.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.nombre;
                select.appendChild(opt);
            });
        }

        function generateQrHandler() {
            const consultorioId = document.getElementById('qrConsultorio').value;
            if (!consultorioId) {
                alert('Seleccione un consultorio');
                return;
            }

            const baseUrl = window.location.origin + window.location.pathname;
            const qrUrl = `${baseUrl}?c=${consultorioId}`;
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrUrl)}`;
            const consultorioNombre = CONFIG.consultorios.find(c => c.id === consultorioId).nombre;

            const output = document.getElementById('qrOutput');
            output.innerHTML = '';

            const container = document.createElement('div');
            container.style.marginTop = '16px';
            container.style.textAlign = 'center';

            const label = document.createElement('div');
            label.className = 'qr-label';
            label.textContent = `QR para: ${consultorioNombre}`;

            const qrImg = document.createElement('img');
            qrImg.src = qrApiUrl;
            qrImg.alt = `QR ${consultorioNombre}`;
            qrImg.style.cssText = 'max-width: 250px; margin: 16px auto; display: block; border: 8px solid white; border-radius: 8px;';

            const urlLabel = document.createElement('div');
            urlLabel.style.cssText = 'font-size: 11px; color: #999; word-break: break-all; margin-top: 8px;';
            urlLabel.textContent = qrUrl;

            container.appendChild(label);
            container.appendChild(qrImg);
            container.appendChild(urlLabel);

            const printBtn = document.createElement('button');
            printBtn.className = 'btn btn-primary';
            printBtn.textContent = 'Imprimir QR';
            printBtn.style.marginTop = '12px';
            printBtn.onclick = () => {
                const printWindow = window.open('', 'QR_PRINT');
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>QR InBody - ${consultorioNombre}</title>
                        <style>
                            body { text-align: center; padding: 40px; font-family: -apple-system, sans-serif; }
                            h2 { color: #1A6B5A; margin-bottom: 8px; }
                            h3 { color: #666; font-weight: normal; margin-bottom: 24px; }
                            img { border: 8px solid #eee; border-radius: 8px; }
                            .url { margin-top: 20px; font-size: 11px; color: #999; }
                            .footer { margin-top: 40px; font-size: 13px; color: #1A6B5A; }
                        </style>
                    </head>
                    <body>
                        <h2>Análisis InBody</h2>
                        <h3>${consultorioNombre}</h3>
                        <img src="${qrApiUrl}" alt="QR Code" width="300" height="300" />
                        <p class="footer">Escanea este código para agendar tu estudio de composición corporal</p>
                        <p class="url">${qrUrl}</p>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                setTimeout(() => printWindow.print(), 500);
            };

            container.appendChild(printBtn);
            output.appendChild(container);
        }

        function updateStats() {
            const total = parseInt(localStorage.getItem('inbody_interactions_total') || '0');
            const completed = parseInt(localStorage.getItem('inbody_completed_total') || '0');
            document.getElementById('statsTotal').textContent = total;
            document.getElementById('statsCompleted').textContent = completed;
        }

        async function loadLeads() {
            let leads = [];

            // Try Supabase first, fall back to localStorage
            if (supabase) {
                try {
                    const { data, error } = await supabase
                        .from('leads')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(500);

                    if (!error && data) {
                        leads = data.map(row => ({
                            id: row.session_id || row.id,
                            fecha: new Date(row.created_at).toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                            consultorioId: row.consultorio_id,
                            consultorioNombre: row.consultorio_nombre,
                            estado: row.estado,
                            nombre: row.nombre || '',
                            telefono: row.telefono || '',
                            fechaNacimiento: row.fecha_nacimiento || '',
                            genero: row.genero || '',
                            talla: row.talla || '',
                        }));
                    } else {
                        leads = JSON.parse(localStorage.getItem('inbody_leads') || '[]');
                    }
                } catch (e) {
                    leads = JSON.parse(localStorage.getItem('inbody_leads') || '[]');
                }
            } else {
                leads = JSON.parse(localStorage.getItem('inbody_leads') || '[]');
            }
            const filterConsultorio = document.getElementById('leadsFilter').value;
            const filterStatus = document.getElementById('leadsStatusFilter').value;

            // Populate consultorio filter
            const select = document.getElementById('leadsFilter');
            const currentVal = select.value;
            const uniqueConsultorios = [...new Set(leads.map(l => l.consultorioId))];
            select.innerHTML = '<option value="all">Todos los consultorios</option>';
            uniqueConsultorios.forEach(id => {
                const lead = leads.find(l => l.consultorioId === id);
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = lead ? lead.consultorioNombre : id;
                select.appendChild(opt);
            });
            select.value = currentVal || 'all';

            // Filter
            let filtered = leads;
            if (filterConsultorio !== 'all') {
                filtered = filtered.filter(l => l.consultorioId === filterConsultorio);
            }
            if (filterStatus !== 'all') {
                filtered = filtered.filter(l => l.estado === filterStatus);
            }

            const countEl = document.getElementById('leadsCount');
            const completados = filtered.filter(l => l.estado === 'completado').length;
            countEl.textContent = `${filtered.length} registros (${completados} completados, ${filtered.length - completados} abandonados)`;

            const container = document.getElementById('leadsTable');
            if (filtered.length === 0) {
                container.innerHTML = '<p style="color: var(--gray-dark); font-size: 13px; text-align: center; padding: 20px;">Sin registros aún.</p>';
                return;
            }

            let html = '<table class="leads-table"><thead><tr>';
            html += '<th>Fecha</th><th>Consultorio</th><th>Estado</th><th>Nombre</th><th>Teléfono</th><th>F. Nacimiento</th><th>Género</th><th>Talla</th>';
            html += '</tr></thead><tbody>';

            filtered.forEach(lead => {
                const statusClass = lead.estado === 'completado' ? 'status-completado' : 'status-abandonado';
                html += '<tr>';
                html += `<td style="white-space: nowrap;">${lead.fecha || '-'}</td>`;
                html += `<td>${lead.consultorioNombre || '-'}</td>`;
                html += `<td class="${statusClass}">${lead.estado}</td>`;
                html += `<td>${lead.nombre || '-'}</td>`;
                html += `<td>${lead.telefono || '-'}</td>`;
                html += `<td>${lead.fechaNacimiento || '-'}</td>`;
                html += `<td>${lead.genero || '-'}</td>`;
                html += `<td>${lead.talla ? lead.talla + ' cm' : '-'}</td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function exportLeadsCSV() {
            let leads = [];

            if (supabase) {
                try {
                    const { data, error } = await supabase
                        .from('leads')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (!error && data) {
                        leads = data.map(row => ({
                            fecha: new Date(row.created_at).toLocaleString('es-MX', { timeZone: 'America/Mexico_City' }),
                            consultorioId: row.consultorio_id,
                            consultorioNombre: row.consultorio_nombre,
                            estado: row.estado,
                            nombre: row.nombre || '',
                            telefono: row.telefono || '',
                            fechaNacimiento: row.fecha_nacimiento || '',
                            genero: row.genero || '',
                            talla: row.talla || '',
                        }));
                    }
                } catch (e) { /* fall through */ }
            }

            if (leads.length === 0) {
                leads = JSON.parse(localStorage.getItem('inbody_leads') || '[]');
            }
            const filterConsultorio = document.getElementById('leadsFilter').value;
            const filterStatus = document.getElementById('leadsStatusFilter').value;

            let filtered = leads;
            if (filterConsultorio !== 'all') {
                filtered = filtered.filter(l => l.consultorioId === filterConsultorio);
            }
            if (filterStatus !== 'all') {
                filtered = filtered.filter(l => l.estado === filterStatus);
            }

            if (filtered.length === 0) {
                alert('No hay registros para exportar');
                return;
            }

            const headers = ['Fecha', 'Consultorio', 'Estado', 'Nombre', 'Teléfono', 'Fecha Nacimiento', 'Género', 'Talla (cm)'];
            const rows = filtered.map(l => [
                l.fecha, l.consultorioNombre, l.estado,
                l.nombre, l.telefono, l.fechaNacimiento,
                l.genero, l.talla
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${(cell || '').replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `leads-inbody-${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        document.getElementById('sendButton').addEventListener('click', () => {
            const input = document.getElementById('userInput').value;
            if (input.trim()) {
                clearInput();
                handleUserInput(input);
            }
        });

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendButton').click();
            }
        });

        let adminTapCount = 0;
        let adminTapTimer = null;

        document.getElementById('adminTrigger').addEventListener('click', () => {
            adminTapCount++;
            clearTimeout(adminTapTimer);

            if (adminTapCount === 1) {
                adminTapTimer = setTimeout(() => {
                    adminTapCount = 0;
                    document.getElementById('adminModal').classList.add('visible');
                    document.getElementById('adminPassword').classList.remove('hidden');
                    document.getElementById('adminContent').classList.add('hidden');
                    document.getElementById('adminPasswordInput').value = '';
                    document.getElementById('adminPasswordInput').focus();
                }, 300);
            }
        });

        document.getElementById('adminClose').addEventListener('click', () => {
            document.getElementById('adminModal').classList.remove('visible');
            state.adminLoggedIn = false;
        });

        document.getElementById('adminLogin').addEventListener('click', () => {
            const pwd = document.getElementById('adminPasswordInput').value;
            if (pwd === CONFIG.password) {
                state.adminLoggedIn = true;
                document.getElementById('adminPassword').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadConsultorios();
                updateStats();
                loadLeads();
                // Load Supabase config
                const savedUrl = localStorage.getItem('inbody_supabase_url') || '';
                const savedKey = localStorage.getItem('inbody_supabase_key') || '';
                document.getElementById('supabaseUrl').value = savedUrl;
                document.getElementById('supabaseKey').value = savedKey;
                testSupabaseConnection().then(ok => updateSupabaseStatus(ok));
            } else {
                alert('Contraseña incorrecta');
            }
        });

        document.getElementById('adminLogout').addEventListener('click', () => {
            state.adminLoggedIn = false;
            document.getElementById('adminModal').classList.remove('visible');
        });

        document.getElementById('addConsultorio').addEventListener('click', addConsultorioHandler);
        document.getElementById('generateQr').addEventListener('click', generateQrHandler);
        document.getElementById('exportLeads').addEventListener('click', exportLeadsCSV);
        document.getElementById('leadsFilter').addEventListener('change', loadLeads);
        document.getElementById('leadsStatusFilter').addEventListener('change', loadLeads);

        document.getElementById('saveSupabase').addEventListener('click', async () => {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            if (!url || !key) {
                alert('Ingrese URL y Key de Supabase');
                return;
            }
            localStorage.setItem('inbody_supabase_url', url);
            localStorage.setItem('inbody_supabase_key', key);
            const ok = initSupabase();
            if (ok) {
                const connected = await testSupabaseConnection();
                updateSupabaseStatus(connected);
                if (connected) {
                    loadLeads();
                    alert('Conexión exitosa con Supabase');
                } else {
                    alert('No se pudo conectar. Verifica la URL, Key y que la tabla "leads" exista.');
                }
            }
        });

        function updateSupabaseStatus(connected) {
            const el = document.getElementById('supabaseStatus');
            if (connected) {
                el.style.background = '#E8F5E9';
                el.style.color = '#2E7D32';
                el.textContent = 'Conectado a Supabase — los leads se guardan en la nube';
            } else if (supabase) {
                el.style.background = '#FFF3E0';
                el.style.color = '#E65100';
                el.textContent = 'Inicializado pero sin conexión a la tabla — revisa que la tabla "leads" exista';
            } else {
                el.style.background = '#FFEBEE';
                el.style.color = '#C62828';
                el.textContent = 'Error cargando librería Supabase — los leads se guardan solo en este navegador';
            }
        }

        document.getElementById('welcomeYes').addEventListener('click', () => {
            document.getElementById('welcomeModal').classList.add('hidden');
            state.chatState = 'ask_name';
            addMessage('Perfecto, comenzaremos con el registro.');
            setTimeout(() => {
                addMessage(CONFIG.messages.askName);
            }, 800);
        });

        document.getElementById('welcomeInfo').addEventListener('click', () => {
            document.getElementById('welcomeModal').classList.add('hidden');
            state.chatState = 'info_menu';
            addMessage(CONFIG.messages.infoMenu);
            showQuickReplies([
                { label: '¿Qué es InBody?', value: 'info_what' },
                { label: '¿Cuánto tiempo dura?', value: 'info_duration' },
                { label: 'Preparación', value: 'info_preparation' },
                { label: 'Contraindicaciones', value: 'info_contraindications' },
                { label: 'Precio', value: 'info_price' },
                { label: 'Entrega de resultados', value: 'info_results' },
                { label: 'Quiero agendar', value: 'want_schedule' },
            ]);
        });

        // ============================================
        // INITIALIZATION
        // ============================================

        window.addEventListener('load', () => {
            state.consultorioId = getParam('c') || 'centro';
            initSupabase();

            // Initial message
            setTimeout(() => {
                addMessage(CONFIG.messages.welcome);
                showQuickReplies([
                    { label: 'Sí, agendar estudio', value: 'schedule' },
                    { label: 'Ver información', value: 'info' },
                ]);
            }, 500);
        });
    </script>
</body>
