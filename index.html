<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody - Análisis de Composición Corporal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #1A6B5A;
            --primary-light: #2A8B7A;
            --primary-dark: #0F4A3A;
            --gray-light: #F5F5F5;
            --gray-medium: #E8E8E8;
            --gray-dark: #666666;
            --gray-text: #333333;
            --white: #FFFFFF;
            --error: #D32F2F;
            --success: #388E3C;
            --border: #DDDDDD;
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--white);
            color: var(--gray-text);
        }
 
        body {
            display: flex;
            flex-direction: column;
        }
 
        /* HEADER */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }
 
        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            flex: 1;
        }
 
        .medical-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
 
        .medical-icon::before {
            content: '✚';
            font-size: 20px;
            font-weight: bold;
        }
 
        .admin-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--gray-dark);
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
 
        .admin-button:hover {
            color: var(--primary);
        }
 
        /* CHAT CONTAINER */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--white);
        }
 
        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
 
        .messages-wrapper::-webkit-scrollbar {
            width: 6px;
        }
 
        .messages-wrapper::-webkit-scrollbar-track {
            background: var(--gray-light);
        }
 
        .messages-wrapper::-webkit-scrollbar-thumb {
            background: var(--gray-medium);
            border-radius: 3px;
        }
 
        /* MESSAGE BUBBLES */
        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }
 
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        .message.system {
            justify-content: flex-start;
        }
 
        .message.user {
            justify-content: flex-end;
        }
 
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
 
        .message.system .bubble {
            background: var(--gray-light);
            color: var(--gray-text);
            border: 1px solid var(--gray-medium);
        }
 
        .message.user .bubble {
            background: var(--primary);
            color: var(--white);
        }
 
        .bubble.error {
            background: #FFEBEE;
            color: var(--error);
            border: 1px solid #FFCDD2;
        }
 
        .bubble.success {
            background: #E8F5E9;
            color: var(--success);
            border: 1px solid #C8E6C9;
        }
 
        /* INFO SECTION */
        .info-section {
            background: var(--gray-light);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            border-left: 4px solid var(--primary);
        }
 
        .info-section h3 {
            color: var(--primary);
            font-size: 16px;
            margin-bottom: 8px;
        }
 
        .info-section p {
            color: var(--gray-text);
            font-size: 14px;
            line-height: 1.6;
        }
 
        /* CONFIRMATION PANEL */
        .confirmation-panel {
            background: var(--gray-light);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            border: 1px solid var(--gray-medium);
        }
 
        .confirmation-panel h3 {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 12px;
        }
 
        .confirmation-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
 
        .confirmation-row:last-child {
            border-bottom: none;
        }
 
        .confirmation-label {
            color: var(--gray-dark);
            font-weight: 500;
        }
 
        .confirmation-value {
            color: var(--gray-text);
            text-align: right;
            flex: 1;
            margin-left: 16px;
        }
 
        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
 
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 120px;
        }
 
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
 
        .btn-primary:hover {
            background: var(--primary-light);
        }
 
        .btn-primary:active {
            background: var(--primary-dark);
        }
 
        .btn-secondary {
            background: var(--gray-medium);
            color: var(--gray-text);
            border: 1px solid var(--border);
        }
 
        .btn-secondary:hover {
            background: var(--gray-light);
        }
 
        .btn-secondary:active {
            background: var(--border);
        }
 
        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            min-width: 80px;
        }
 
        /* INPUT AREA */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            background: var(--white);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
 
        .input-field {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--gray-text);
            transition: border-color 0.2s;
        }
 
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26, 107, 90, 0.1);
        }
 
        .input-field::placeholder {
            color: #AAAAAA;
        }
 
        .btn-send {
            padding: 10px 16px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
 
        .btn-send:hover {
            background: var(--primary-light);
        }
 
        .btn-send:active {
            background: var(--primary-dark);
        }
 
        /* TYPING INDICATOR */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
 
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-dark);
            animation: typing 1.4s infinite;
        }
 
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
 
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
 
        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }
 
        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
 
        .modal-overlay.visible {
            display: flex;
        }
 
        .modal {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.3s ease-out;
        }
 
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
 
        .modal-header {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
        }
 
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray-dark);
        }
 
        .modal-close:hover {
            color: var(--gray-text);
        }
 
        /* ADMIN PANEL */
        .admin-section {
            margin-bottom: 24px;
        }
 
        .admin-section h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--gray-medium);
            padding-bottom: 8px;
        }
 
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
 
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
 
        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-dark);
        }
 
        .form-group input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
 
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26, 107, 90, 0.1);
        }
 
        .consultorio-item {
            background: var(--gray-light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
 
        .consultorio-info {
            flex: 1;
            font-size: 14px;
        }
 
        .consultorio-info .name {
            font-weight: 600;
            color: var(--gray-text);
        }
 
        .consultorio-info .meta {
            font-size: 12px;
            color: var(--gray-dark);
            margin-top: 4px;
        }
 
        .consultorio-actions {
            display: flex;
            gap: 6px;
        }
 
        .btn-icon {
            padding: 6px 10px;
            font-size: 12px;
            flex: 0;
            min-width: auto;
        }
 
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
 
        .stat-card {
            background: var(--gray-light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--gray-medium);
        }
 
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
 
        .stat-label {
            font-size: 12px;
            color: var(--gray-dark);
            margin-top: 4px;
        }
 
        .qr-container {
            background: var(--white);
            padding: 12px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid var(--border);
        }
 
        .qr-label {
            font-size: 12px;
            color: var(--gray-dark);
            margin-bottom: 8px;
            text-align: center;
        }
 
        /* WELCOME MODAL */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
 
        .welcome-modal.hidden {
            display: none;
        }
 
        .welcome-content {
            background: var(--white);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
 
        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
 
        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }
 
        .welcome-subtitle {
            font-size: 14px;
            color: var(--gray-dark);
            margin-bottom: 24px;
            line-height: 1.6;
        }
 
        .welcome-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
 
        @media (max-width: 600px) {
            .modal {
                width: 95%;
                max-height: 90vh;
            }
 
            .welcome-content {
                width: 95%;
                padding: 24px;
            }
 
            .button-group {
                flex-direction: column;
            }
 
            .btn {
                min-width: auto;
            }
 
            .stats-grid {
                grid-template-columns: 1fr;
            }
 
            .bubble {
                max-width: 95%;
            }
        }
 
        /* HIDE ELEMENTS */
        .hidden {
            display: none !important;
        }
 
        .invisible {
            visibility: hidden;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-title">
            <div class="medical-icon"></div>
            <span>Asistente InBody</span>
        </div>
        <button class="admin-button" id="adminTrigger" title="Panel de administración">⚙️</button>
    </div>
 
    <!-- CHAT CONTAINER -->
    <div class="chat-container">
        <div class="messages-wrapper" id="messagesWrapper"></div>
        <div class="input-area" id="inputArea">
            <input
                type="text"
                class="input-field"
                id="userInput"
                placeholder="Escriba su respuesta..."
                autocomplete="off"
            >
            <button class="btn-send" id="sendButton">Enviar</button>
        </div>
    </div>
 
    <!-- WELCOME MODAL -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="welcome-content">
            <div class="welcome-icon">✚</div>
            <h2 class="welcome-title">Análisis InBody</h2>
            <p class="welcome-subtitle">¿Desea agendar su estudio de composición corporal?</p>
            <div class="welcome-buttons">
                <button class="btn btn-primary" id="welcomeYes">Sí, agendar estudio</button>
                <button class="btn btn-secondary" id="welcomeInfo">Ver información</button>
            </div>
        </div>
    </div>
 
    <!-- ADMIN MODAL -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <button class="modal-close" id="adminClose">✕</button>
            <div class="modal-header">Panel de Administración</div>
 
            <!-- PASSWORD ENTRY -->
            <div id="adminPassword" class="admin-section">
                <div class="admin-form">
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="adminPasswordInput" placeholder="Ingrese contraseña">
                    </div>
                    <button class="btn btn-primary" id="adminLogin">Ingresar</button>
                </div>
            </div>
 
            <!-- ADMIN CONTENT (Hidden until login) -->
            <div id="adminContent" class="hidden">
                <!-- STATS -->
                <div class="admin-section">
                    <h2>Estadísticas</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="statsTotal">0</div>
                            <div class="stat-label">Interacciones totales</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="statsCompleted">0</div>
                            <div class="stat-label">Citas agendadas</div>
                        </div>
                    </div>
                </div>
 
                <!-- CONSULTORIOS -->
                <div class="admin-section">
                    <h2>Gestionar Consultorios</h2>
                    <div class="admin-form">
                        <div class="form-group">
                            <label>ID (slug)</label>
                            <input type="text" id="consultorioId" placeholder="ej: centro">
                        </div>
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" id="consultorioName" placeholder="ej: Consultorio Centro">
                        </div>
                        <div class="form-group">
                            <label>Doctor/Doctora</label>
                            <input type="text" id="consultorioDoctor" placeholder="ej: Dra. María García">
                        </div>
                        <div class="form-group">
                            <label>Número WhatsApp</label>
                            <input type="text" id="consultorioWhatsapp" placeholder="ej: 3312345678">
                        </div>
                        <div class="form-group">
                            <label>Dirección</label>
                            <input type="text" id="consultorioAddress" placeholder="ej: Av. Juárez 120">
                        </div>
                        <button class="btn btn-primary" id="addConsultorio">Agregar Consultorio</button>
                    </div>
 
                    <div id="consultoriosList"></div>
                </div>
 
                <!-- QR GENERATOR -->
                <div class="admin-section">
                    <h2>Generar Códigos QR</h2>
                    <div class="admin-form">
                        <div class="form-group">
                            <label>Seleccionar consultorio</label>
                            <select id="qrConsultorio" style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit;">
                                <option value="">-- Seleccionar --</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="generateQr">Generar QR</button>
                    </div>
                    <div id="qrOutput"></div>
                </div>
 
                <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" id="adminLogout">Cerrar sesión</button>
            </div>
        </div>
    </div>
 
    <script>
        // ============================================
        // CONFIGURATION & STATE
        // ============================================
 
        const CONFIG = {
            password: 'inbody2024',
            colors: {
                primary: '#1A6B5A',
                gray: '#F5F5F5',
            },
            consultorios: [
                { id: 'centro', nombre: 'Consultorio Centro', doctor: 'Dra. María García', whatsapp: '3312345678', direccion: 'Av. Juárez 120 Col. Centro' },
                { id: 'providencia', nombre: 'Consultorio Providencia', doctor: 'Dr. Roberto Sánchez', whatsapp: '3387654321', direccion: 'Av. Providencia 456' },
                { id: 'zapopan', nombre: 'Consultorio Zapopan', doctor: 'Dra. Laura Martínez', whatsapp: '3398765432', direccion: 'Blvd. Puerta de Hierro 789' },
                { id: 'tlaquepaque', nombre: 'Consultorio Tlaquepaque', doctor: 'Dr. Carlos López', whatsapp: '3376543210', direccion: 'Av. Niños Héroes 234' },
                { id: 'chapalita', nombre: 'Consultorio Chapalita', doctor: 'Dra. Ana Rodríguez', whatsapp: '3365432109', direccion: 'Av. Guadalupe 567' },
                { id: 'vallarta', nombre: 'Consultorio Vallarta', doctor: 'Dr. Miguel Torres', whatsapp: '3354321098', direccion: 'Av. Vallarta 890' },
            ],
            messages: {
                welcome: '¡Hola! Bienvenido al análisis InBody. Seleccione una opción para continuar.',
                infoMenu: '¿Qué desea saber sobre el estudio InBody?',
                errorName: 'Por favor, ingrese su nombre completo (nombre y apellido).',
                errorPhone: 'Por favor, ingrese un teléfono válido (10 dígitos).',
                errorBirthdate: 'Por favor, ingrese una fecha válida (formato: dd/mm/aaaa).',
                errorGender: 'Por favor, seleccione un género válido.',
                errorHeight: 'Por favor, ingrese una talla válida (entre 100 y 220 cm).',
                askName: '¿Cuál es su nombre completo?',
                askPhone: '¿Cuál es su número de teléfono?',
                askBirthdate: '¿Cuál es su fecha de nacimiento? (formato: dd/mm/aaaa)',
                askGender: '¿Cuál es su género de nacimiento?',
                askHeight: '¿Cuál es su talla en centímetros?',
                confirmData: 'Verifique que todos sus datos sean correctos:',
                editField: '¿Cuál campo desea modificar?',
                success: '¡Perfecto! Abriremos WhatsApp para agendar su cita.',
            },
            infoContent: {
                what: {
                    title: '¿Qué es InBody?',
                    text: 'El análisis InBody es un estudio de composición corporal que mide con precisión su grasa corporal, masa muscular, contenido mineral óseo y análisis de segmentación corporal. Es una evaluación no invasiva que toma solo 45 segundos y proporciona resultados detallados en tiempo real.',
                },
                duration: {
                    title: '¿Cuánto tiempo dura?',
                    text: 'El análisis InBody completo toma aproximadamente 45 segundos. El proceso es simple: solo debe pararse en la plataforma del equipo y sostenerse en los electrodos. La toma del análisis toma menos de 1 minuto.',
                },
                preparation: {
                    title: 'Preparación necesaria',
                    text: 'Recomendamos ayunar 2-3 horas antes del análisis para obtener resultados más precisos. Evite ejercicio intenso 24 horas antes. No es necesario hacer preparativos especiales; simplemente venga con ropa cómoda.',
                },
                contraindications: {
                    title: 'Contraindicaciones',
                    text: 'No se recomienda el análisis en personas con marcapasos, implantes metálicos activos, o durante el embarazo. Si tiene alguna condición médica especial, consulte con nuestro personal antes del análisis.',
                },
                price: {
                    title: 'Precio del análisis',
                    text: 'El costo del análisis InBody es de $250 MXN. Este incluye el estudio completo y un reporte detallado de composición corporal. Consulte con su consultorio sobre promociones especiales.',
                },
                results: {
                    title: 'Entrega de resultados',
                    text: 'Recibe los resultados inmediatamente después del análisis en forma de un reporte detallado con gráficos. Además, le proporcionaremos una copia digital que puede llevar a su nutriólogo o entrenador personal.',
                },
            },
        };
 
        // STATE
        let state = {
            screen: 'welcome', // welcome, chat, info
            chatState: 'welcome', // FSM state
            consultorioId: null,
            formData: {
                nombre: '',
                telefono: '',
                fechaNacimiento: '',
                genero: '',
                talla: '',
            },
            adminLoggedIn: false,
            typingActive: false,
        };
 
        // ============================================
        // DATA PARSING / VALIDATION
        // ============================================
 
        function parsePhone(input) {
            const digits = input.replace(/\D/g, '');
            if (digits.length === 10 && /^\d{10}$/.test(digits)) {
                return digits;
            }
            return null;
        }
 
        function parseName(input) {
            const trimmed = input.trim();
            const words = trimmed.split(/\s+/).filter(w => w.length > 0);
            if (words.length >= 2) {
                return words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            }
            return null;
        }
 
        function parseBirthdate(input) {
            const cleaned = input.trim();
 
            // Try dd/mm/yyyy or dd-mm-yyyy
            let match = cleaned.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
            if (match) {
                const [_, day, month, year] = match;
                const d = parseInt(day);
                const m = parseInt(month);
                const y = parseInt(year);
                if (d >= 1 && d <= 31 && m >= 1 && m <= 12 && y >= 1900 && y <= 2100) {
                    const date = new Date(y, m - 1, d);
                    if (date.getDate() === d) {
                        const age = new Date().getFullYear() - y;
                        if (age >= 10 && age <= 100) {
                            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${y}`;
                        }
                    }
                }
            }
 
            return null;
        }
 
        function parseHeight(input) {
            const cleaned = input.toLowerCase().replace(/\s*cm?\s*$/, '').trim();
            const num = parseFloat(cleaned.replace(',', '.'));
 
            if (!isNaN(num)) {
                let height = num;
                if (num < 3) {
                    height = num * 100;
                }
                if (height >= 100 && height <= 220) {
                    return Math.round(height);
                }
            }
 
            return null;
        }
 
        function parseGender(input) {
            const normalized = input.toLowerCase().trim();
            const masc = ['masculino', 'hombre', 'm', 'h', 'masc'];
            const fem = ['femenino', 'mujer', 'f', 'fem'];
 
            if (masc.includes(normalized)) return 'Masculino';
            if (fem.includes(normalized)) return 'Femenino';
 
            return null;
        }

        // ============================================
        // ANALYTICS
        // ============================================
 
        function trackInteraction() {
            const key = `inbody_interactions_${state.consultorioId}`;
            const current = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, current + 1);
 
            const totalKey = 'inbody_interactions_total';
            const total = parseInt(localStorage.getItem(totalKey) || '0');
            localStorage.setItem(totalKey, total + 1);
        }
 
        function trackCompletion() {
            const key = `inbody_completed_${state.consultorioId}`;
            const current = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, current + 1);
 
            const totalKey = 'inbody_completed_total';
            const total = parseInt(localStorage.getItem(totalKey) || '0');
            localStorage.setItem(totalKey, total + 1);
        }
 
        // ============================================
        // CHAT FLOW
        // ============================================
 
        function handleUserInput(input) {
            const trimmed = input.trim();
            trackInteraction();
 
            if (state.chatState === 'welcome') {
                if (trimmed.toLowerCase().includes('sí') || trimmed.toLowerCase().includes('agendar')) {
                    state.chatState = 'ask_name';
                    addMessage('Perfecto, comenzaremos con el registro.');
                    setTimeout(() => {
                        removeTyping();
                        addMessage(CONFIG.messages.askName);
                    }, 800);
                } else if (trimmed.toLowerCase().includes('información') || trimmed.toLowerCase().includes('saber')) {
                    state.chatState = 'info_menu';
                    addMessage(CONFIG.messages.infoMenu);
                    showQuickReplies([
                        { label: '¿Qué es InBody?', value: 'info_what' },
                        { label: '¿Cuánto tiempo dura?', value: 'info_duration' },
                        { label: 'Preparación', value: 'info_preparation' },
                        { label: 'Contraindicaciones', value: 'info_contraindications' },
                        { label: 'Precio', value: 'info_price' },
                        { label: 'Entrega de resultados', value: 'info_results' },
                        { label: 'Quiero agendar', value: 'want_schedule' },
                    ]);
                } else {
                    addMessage(CONFIG.messages.welcome);
                    showQuickReplies([
                        { label: 'Sí, agendar estudio', value: 'schedule' },
                        { label: 'Ver información', value: 'info' },
                    ]);
                }
                return;
            }
 
            if (state.chatState === 'info_menu') {
                const lower = trimmed.toLowerCase();
                if (lower.includes('qué') || lower.includes('what')) {
                    addInfoBubble(CONFIG.infoContent.what.title, CONFIG.infoContent.what.text);
                } else if (lower.includes('tiempo') || lower.includes('dura')) {
                    addInfoBubble(CONFIG.infoContent.duration.title, CONFIG.infoContent.duration.text);
                } else if (lower.includes('preparación') || lower.includes('preparaci')) {
                    addInfoBubble(CONFIG.infoContent.preparation.title, CONFIG.infoContent.preparation.text);
                } else if (lower.includes('contraindicación') || lower.includes('contraindc')) {
                    addInfoBubble(CONFIG.infoContent.contraindications.title, CONFIG.infoContent.contraindications.text);
                } else if (lower.includes('precio') || lower.includes('costo') || lower.includes('cuesta')) {
                    addInfoBubble(CONFIG.infoContent.price.title, CONFIG.infoContent.price.text);
                } else if (lower.includes('resultado') || lower.includes('entrega')) {
                    addInfoBubble(CONFIG.infoContent.results.title, CONFIG.infoContent.results.text);
                } else if (lower.includes('agendar') || lower.includes('quiero')) {
                    state.chatState = 'ask_name';
                    addMessage('Excelente, procedaremos con el registro para agendar su cita.');
                    setTimeout(() => {
                        removeTyping();
                        addMessage(CONFIG.messages.askName);
                    }, 800);
                    return;
                }
 
                setTimeout(() => {
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage('¿Desea saber algo más o prefiere agendar su cita?');
                        showQuickReplies([
                            { label: 'Saber más', value: 'more_info' },
                            { label: 'Agendar ahora', value: 'schedule_now' },
                        ]);
                    }, 800);
                }, 500);
                return;
            }
 
            // NAME
            if (state.chatState === 'ask_name') {
                const parsed = parseName(trimmed);
                if (parsed) {
                    addMessage(trimmed, true);
                    state.formData.nombre = parsed;
                    state.chatState = 'ask_phone';
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage(CONFIG.messages.askPhone);
                    }, 800);
                } else {
                    addMessage(trimmed, true);
                    addMessage(CONFIG.messages.errorName, false, true);
                }
                return;
            }
 
            // PHONE
            if (state.chatState === 'ask_phone') {
                const parsed = parsePhone(trimmed);
                if (parsed) {
                    addMessage(trimmed, true);
                    state.formData.telefono = parsed;
                    state.chatState = 'ask_birthdate';
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage(CONFIG.messages.askBirthdate);
                    }, 800);
                } else {
                    addMessage(trimmed, true);
                    addMessage(CONFIG.messages.errorPhone, false, true);
                }
                return;
            }
 
            // BIRTHDATE
            if (state.chatState === 'ask_birthdate') {
                const parsed = parseBirthdate(trimmed);
                if (parsed) {
                    addMessage(trimmed, true);
                    state.formData.fechaNacimiento = parsed;
                    state.chatState = 'ask_gender';
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage(CONFIG.messages.askGender);
                        showQuickReplies([
                            { label: 'Masculino', value: 'male' },
                            { label: 'Femenino', value: 'female' },
                        ]);
                    }, 800);
                } else {
                    addMessage(trimmed, true);
                    addMessage(CONFIG.messages.errorBirthdate, false, true);
                }
                return;
            }
 
            // GENDER
            if (state.chatState === 'ask_gender') {
                const parsed = parseGender(trimmed);
                if (parsed) {
                    addMessage(parsed, true);
                    state.formData.genero = parsed;
                    state.chatState = 'ask_height';
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        addMessage(CONFIG.messages.askHeight);
                    }, 800);
                } else {
                    addMessage(trimmed, true);
                    addMessage(CONFIG.messages.errorGender, false, true);
                }
                return;
            }
 
            // HEIGHT
            if (state.chatState === 'ask_height') {
                const parsed = parseHeight(trimmed);
                if (parsed) {
                    addMessage(trimmed, true);
                    state.formData.talla = parsed;
                    state.chatState = 'confirm';
                    showTyping();
                    setTimeout(() => {
                        removeTyping();
                        showConfirmation();
                    }, 800);
                } else {
                    addMessage(trimmed, true);
                    addMessage(CONFIG.messages.errorHeight, false, true);
                }
                return;
            }
 
            // EDIT FIELDS
            if (state.chatState === 'confirm' && state.formData.nombre) {
                if (trimmed.toLowerCase().includes('nombre')) {
                    addMessage(trimmed, true);
                    state.chatState = 'ask_name';
                    addMessage(CONFIG.messages.askName);
                } else if (trimmed.toLowerCase().includes('teléfono')) {
                    addMessage(trimmed, true);
                    state.chatState = 'ask_phone';
                    addMessage(CONFIG.messages.askPhone);
                } else if (trimmed.toLowerCase().includes('fecha')) {
                    addMessage(trimmed, true);
                    state.chatState = 'ask_birthdate';
                    addMessage(CONFIG.messages.askBirthdate);
                } else if (trimmed.toLowerCase().includes('género')) {
                    addMessage(trimmed, true);
                    state.chatState = 'ask_gender';
                    addMessage(CONFIG.messages.askGender);
                    showQuickReplies([
                        { label: 'Masculino', value: 'male' },
                        { label: 'Femenino', value: 'female' },
                    ]);
                } else if (trimmed.toLowerCase().includes('talla')) {
                    addMessage(trimmed, true);
                    state.chatState = 'ask_height';
                    addMessage(CONFIG.messages.askHeight);
                }
            }
        }
 
        function sendToWhatsApp() {
            const consultorio = CONFIG.consultorios.find(c => c.id === state.consultorioId);
 
            let message = `Nueva cita InBody\n\n`;
            message += `Nombre: ${state.formData.nombre}\n`;
            message += `Teléfono: ${state.formData.telefono}\n`;
            message += `Fecha de nacimiento: ${state.formData.fechaNacimiento}\n`;
            message += `Género: ${state.formData.genero}\n`;
            message += `Talla: ${state.formData.talla} cm\n`;
            if (consultorio) {
                message += `Consultorio de origen: ${consultorio.nombre}`;
            }
 
            const encoded = encodeURIComponent(message);
            const whatsappNumber = consultorio ? consultorio.whatsapp : '523312345678';
            const url = `https://wa.me/${whatsappNumber}?text=${encoded}`;
 
            addMessage(CONFIG.messages.success, false, false, true);
            trackCompletion();
            state.chatState = 'done';
 
            setTimeout(() => {
                window.open(url, '_blank');
            }, 1000);
        }
 
        // ============================================
        // ADMIN PANEL
        // ============================================
 
        function loadConsultorios() {
            const stored = localStorage.getItem('inbody_consultorios');
            if (stored) {
                CONFIG.consultorios = JSON.parse(stored);
            }
            renderConsultorios();
            updateQrSelect();
        }
 
        function renderConsultorios() {
            const list = document.getElementById('consultoriosList');
            list.innerHTML = '';
 
            CONFIG.consultorios.forEach(c => {
                const item = document.createElement('div');
                item.className = 'consultorio-item';
                item.innerHTML = `
                    <div class="consultorio-info">
                        <div class="name">${c.nombre}</div>
                        <div class="meta">${c.doctor} • ${c.whatsapp} • ${c.direccion}</div>
                    </div>
                    <div class="consultorio-actions">
                        <button class="btn btn-secondary btn-icon" onclick="deleteConsultorio('${c.id}')">Eliminar</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }
 
        function addConsultorioHandler() {
            const id = document.getElementById('consultorioId').value.trim();
            const nombre = document.getElementById('consultorioName').value.trim();
            const doctor = document.getElementById('consultorioDoctor').value.trim();
            const whatsapp = document.getElementById('consultorioWhatsapp').value.trim();
            const direccion = document.getElementById('consultorioAddress').value.trim();
 
            if (!id || !nombre || !doctor || !whatsapp || !direccion) {
                alert('Complete todos los campos');
                return;
            }
 
            const exists = CONFIG.consultorios.findIndex(c => c.id === id);
            if (exists >= 0) {
                CONFIG.consultorios[exists] = { id, nombre, doctor, whatsapp, direccion };
            } else {
                CONFIG.consultorios.push({ id, nombre, doctor, whatsapp, direccion });
            }
 
            localStorage.setItem('inbody_consultorios', JSON.stringify(CONFIG.consultorios));
            renderConsultorios();
            updateQrSelect();
 
            document.getElementById('consultorioId').value = '';
            document.getElementById('consultorioName').value = '';
            document.getElementById('consultorioDoctor').value = '';
            document.getElementById('consultorioWhatsapp').value = '';
            document.getElementById('consultorioAddress').value = '';
        }
 
        function deleteConsultorio(id) {
            if (confirm('¿Eliminar este consultorio?')) {
                CONFIG.consultorios = CONFIG.consultorios.filter(c => c.id !== id);
                localStorage.setItem('inbody_consultorios', JSON.stringify(CONFIG.consultorios));
                renderConsultorios();
                updateQrSelect();
            }
        }
 
        function updateQrSelect() {
            const select = document.getElementById('qrConsultorio');
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            CONFIG.consultorios.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.nombre;
                select.appendChild(opt);
            });
        }
 
        function generateQrHandler() {
            const consultorioId = document.getElementById('qrConsultorio').value;
            if (!consultorioId) {
                alert('Seleccione un consultorio');
                return;
            }
 
            const baseUrl = window.location.origin + window.location.pathname;
            const qrUrl = `${baseUrl}?c=${consultorioId}`;
 
            const output = document.getElementById('qrOutput');
            output.innerHTML = '';
 
            const container = document.createElement('div');
            container.style.marginTop = '16px';
 
            const label = document.createElement('div');
            label.className = 'qr-label';
            label.textContent = `QR para: ${CONFIG.consultorios.find(c => c.id === consultorioId).nombre}`;
 
            const qrDiv = document.createElement('div');
            qrDiv.className = 'qr-container';
            qrDiv.id = 'qrCanvas';
 
            container.appendChild(label);
            container.appendChild(qrDiv);
 
            const printBtn = document.createElement('button');
            printBtn.className = 'btn btn-primary';
            printBtn.textContent = 'Imprimir QR';
            printBtn.style.marginTop = '12px';
            printBtn.onclick = () => {
                const printWindow = window.open('', 'QR_PRINT');
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>QR InBody</title>
                        <style>
                            body { text-align: center; padding: 20px; }
                            h2 { color: #1A6B5A; }
                            #qrCode { display: inline-block; margin: 20px; }
                        </style>
                    </head>
                    <body>
                        <h2>${CONFIG.consultorios.find(c => c.id === consultorioId).nombre}</h2>
                        <div id="qrCode"></div>
                        <p style="margin-top: 20px; font-size: 12px;">URL: ${qrUrl}</p>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                setTimeout(() => {
                    new QRCode(printWindow.document.getElementById('qrCode'), qrUrl);
                    printWindow.print();
                }, 500);
            };
 
            container.appendChild(printBtn);
            output.appendChild(container);
 
            // Generate QR
            setTimeout(() => {
                new QRCode(document.getElementById('qrCanvas'), qrUrl);
            }, 100);
        }
 
        function updateStats() {
            const total = parseInt(localStorage.getItem('inbody_interactions_total') || '0');
            const completed = parseInt(localStorage.getItem('inbody_completed_total') || '0');
            document.getElementById('statsTotal').textContent = total;
            document.getElementById('statsCompleted').textContent = completed;
        }

        // EVENT LISTENERS

        });

            const pwd = document.getElementById('adminPasswordInput').value;

                document.getElementById('adminContent').classList.remove('hidden');

                updateStats();

                alert('Contraseña incorrecta');
            }

        document.getElementById('adminLogout').addEventListener('click', () => {
            state.adminLoggedIn = false;
            document.getElementById('adminModal').classList.remove('visible');
        });
 
        document.getElementById('addConsultorio').addEventListener('click', addConsultorioHandler);
        document.getElementById('generateQr').addEventListener('click', generateQrHandler);
 
        document.getElementById('welcomeYes').addEventListener('click', () => {
            document.getElementById('welcomeModal').classList.add('hidden');
            state.chatState = 'ask_name';
            addMessage('Perfecto, comenzaremos con el registro.');
            setTimeout(() => {
                addMessage(CONFIG.messages.askName);
            }, 800);
        });
 
        document.getElementById('welcomeInfo').addEventListener('click', () => {
            document.getElementById('welcomeModal').classList.add('hidden');
            state.chatState = 'info_menu';
            addMessage(CONFIG.messages.infoMenu);
            showQuickReplies([
                { label: '¿Qué es InBody?', value: 'info_what' },
                { label: '¿Cuánto tiempo dura?', value: 'info_duration' },
                { label: 'Preparación', value: 'info_preparation' },
                { label: 'Contraindicaciones', value: 'info_contraindications' },
                { label: 'Precio', value: 'info_price' },
                { label: 'Entrega de resultados', value: 'info_results' },
                { label: 'Quiero agendar', value: 'want_schedule' },
            ]);
        });
 
        // ============================================
        // INITIALIZATION
        // ============================================
 
        window.addEventListener('load', () => {
            state.consultorioId = getParam('c') || 'centro';
 
            // Initial message
            setTimeout(() => {
                addMessage(CONFIG.messages.welcome);
                showQuickReplies([
                    { label: 'Sí, agendar estudio', value: 'schedule' },
                    { label: 'Ver información', value: 'info' },
                ]);
            }, 500);
        });
    </script>
